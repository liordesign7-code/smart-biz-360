<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>SmartBiz360</title>
</head>

<body style="font-family:Arial; text-align:center; padding:40px;">

  <div id="login-box" style="
    width:90%;
    max-width:320px;
    margin:auto;
    background:#f8f9ff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
  ">

    <h2>ברוך הבא 👋</h2>

    <input id="user-name" placeholder="שם שלך"
    style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc">

    <input id="user-phone" placeholder="טלפון"
    style="width:100%;padding:10px;margin-bottom:15px;border-radius:8px;border:1px solid #ccc">

    <button onclick="saveUser()" style="
      width:100%;
      padding:12px;
      background:#3b5bdb;
      color:#fff;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    ">
      כניסה למערכת
    </button>

  </div>

  <script src="app.js"></script>

</body>
</html>
